syntax = "proto3";

option csharp_namespace = "Artnet.Manager.CoreData.Host.Grpc.Protos.ArtListing.Insights";

import "Protos/ArtListing/Search/art_listing_search_results.proto";
import "Protos/Common/common_filters.proto";
import "google/protobuf/wrappers.proto";

package artnet.coredata.artlisting.insights;

message GetNotableArtListingsRequest {
	optional NotableArtListingFilters filters = 1; // The possible filters can be restricted in GraphQL mesh, if needed per client
	NotableFor notable_for = 2;
	optional google.protobuf.Int32Value minimum_total_listings = 3; // the minimum number of listings you can pull a notable listing for B2B clients usually 4000 lots minimum. For B2B clients this is restricted.
	optional int32 limit = 4; // For B2B clients - this is restricted to a max of 1 or 3 depending on the client relationship.
}

message GetNotableArtListingsResponse {
	repeated artnet.coredata.artlisting.search.search_results.ArtListingSummary results = 1; // The return properties can be limited in GraphQL mesh, if needed per client
	optional int64 count = 2;
}

message NotableArtListingFilters {
	optional artnet.coredata.common.EntityFilter creator = 1; // Andy Warhol, Tim Smith (only both together)
	//optional artnet.coredata.artlisting.search.filters.EntityFilter sale = 2;
	//optional artnet.coredata.artlisting.search.filters.EntityFilter auction_house = 3;
}

enum NotableFor {
	UNSPECIFIED = 0;
	HIGHEST_PRICE = 1;
	HIGHEST_SOLD_ABOVE_ESTIMATE_RATE = 2;
	HIGHEST_PRICE_PER_SQ_INCH = 3;
}