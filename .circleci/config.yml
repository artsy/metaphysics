version: 2.1

# Set `canary_build: true` when triggering a pipeline to build a canary image
# from any branch without touching the moving :staging / :production tags.
# Trigger via the CircleCI API:
#   curl -X POST -u <CIRCLE_TOKEN>: \
#     -H 'Content-Type: application/json' \
#     -d '{"branch":"<your-branch>","parameters":{"canary_build":true}}' \
#     https://circleci.com/api/v2/project/gh/artsy/metaphysics/pipeline
parameters:
  canary_build:
    type: boolean
    default: false

orbs:
  hokusai: artsy/hokusai@volatile
  horizon: artsy/release@volatile
  node: circleci/node@7.2.1

not_staging_or_release: &not_staging_or_release
  filters:
    branches:
      ignore:
        - staging
        - release

only_main: &only_main
  context: hokusai
  filters:
    branches:
      only: main

only_release: &only_release
  context: hokusai
  filters:
    branches:
      only: release

only_development: &only_development
  filters:
    branches:
      ignore:
        - staging
        - release
        - main

commands:
  setup_hokusai:
    steps:
      - run:
          name: Let hokusai modify /usr/local/bin
          command: sudo chmod -R 777 /usr/local/bin
      - hokusai/install-aws-iam-authenticator
      - run:
          name: Install hokusai
          command: |
            sudo apt update
            sudo apt install --assume-yes python3-pip
            pip install awscli --upgrade
            pip install hokusai
      - hokusai/configure-hokusai
  fix_corepack_permissions:
    # Only needed for jobs that don't use setup_hokusai (which already fixes /usr/local/bin permissions)
    steps:
      - run:
          name: Fix permissions for corepack
          command: sudo chmod -R 777 /usr/local/bin

jobs:
  test:
    executor:
      name: node/default
      tag: "22.5"
    parallelism: 6
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn-berry
      - run:
          name: Run Jest
          command: |
            yarn jest --ci --forceExit --logHeapUsage --runInBand --reporters=default --reporters=jest-junit --shard=$(expr $CIRCLE_NODE_INDEX + 1)/$CIRCLE_NODE_TOTAL
  type-check:
    executor:
      name: node/default
      tag: "22.5"
    steps:
      - checkout
      - fix_corepack_permissions
      - node/install-packages:
          pkg-manager: yarn-berry
      - run: yarn type-check
  ensure-schema-update:
    executor:
      name: node/default
      tag: "22.5"
    steps:
      - checkout
      - setup_hokusai
      - node/install-packages:
          pkg-manager: yarn-berry
      - run: scripts/ensure-schema-update.sh
  push-schema-changes:
    executor:
      name: node/default
      tag: "22.5"
    parallelism: 7
    steps:
      - checkout
      - setup_hokusai
      - node/install-packages:
          pkg-manager: yarn-berry
      - run:
          name: Push schema changes
          command: |
            # Run the Node.js script, passing total_nodes and node_index as arguments
            node scripts/push-schema-changes.js $CIRCLE_NODE_TOTAL $CIRCLE_NODE_INDEX
  deploy-cloudflare-workers-staging:
    executor:
      name: node/default
      tag: "22.5"
    steps:
      - checkout
      - fix_corepack_permissions
      - node/install-packages:
          pkg-manager: yarn-berry
      - run: yarn deploy-cloudflare-workers:staging
  deploy-cloudflare-workers:
    executor:
      name: node/default
      tag: "22.5"
    steps:
      - checkout
      - fix_corepack_permissions
      - node/install-packages:
          pkg-manager: yarn-berry
      - run: yarn deploy-cloudflare-workers
  canary-image-push:
    # Builds the canary image from the current commit and pushes it to ECR
    # tagged with the commit SHA only. Verifies that the moving :staging tag
    # is not overwritten — if it is, the job fails loudly so the operator can
    # roll the tag back before any pod restart pulls the new image.
    executor:
      name: node/default
      tag: "22.5"
    steps:
      - checkout
      - setup_hokusai
      - run:
          name: Build & push canary image (SHA tag only)
          command: |
            set -euo pipefail
            SHA=$(git rev-parse HEAD)
            echo "==> canary build for $SHA"

            BEFORE=$(aws ecr describe-images --repository-name metaphysics --region us-east-1 \
              --image-ids imageTag=staging \
              --query 'imageDetails[0].imageDigest' --output text)
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "None" ]; then
              echo "could not resolve :staging digest" >&2
              exit 1
            fi
            echo "    :staging currently points at $BEFORE"

            # Flag name varies by hokusai version. Try both.
            if ! hokusai registry push --tag "$SHA" --skip-latest 2>/dev/null; then
              hokusai registry push --tag "$SHA" --no-update-latest
            fi

            AFTER=$(aws ecr describe-images --repository-name metaphysics --region us-east-1 \
              --image-ids imageTag=staging \
              --query 'imageDetails[0].imageDigest' --output text)
            if [ "$AFTER" != "$BEFORE" ]; then
              echo "FATAL: :staging digest moved during canary push" >&2
              echo "  before: $BEFORE" >&2
              echo "  after:  $AFTER" >&2
              echo "Roll the :staging tag back to $BEFORE before any pod restart." >&2
              exit 1
            fi
            echo "    :staging unchanged ✓"
            echo "canary image ready: 585031190124.dkr.ecr.us-east-1.amazonaws.com/metaphysics:$SHA"

workflows:
  default:
    when:
      not: << pipeline.parameters.canary_build >>
    jobs:
      - test:
          <<: *not_staging_or_release

      - type-check:
          <<: *not_staging_or_release

      - ensure-schema-update:
          context: hokusai
          <<: *only_development

      # staging
      - hokusai/push:
          name: push-staging-image
          <<: *only_main

      - hokusai/deploy-staging:
          name: deploy-staging
          <<: *only_main
          project-name: metaphysics
          requires:
            - push-staging-image
            - type-check
            - test

      - push-schema-changes:
          <<: *only_main
          context: hokusai
          requires:
            - deploy-staging

      - deploy-cloudflare-workers-staging:
          <<: *only_main
          context: cloudflare
          requires:
            - deploy-staging

      # release
      - horizon/block:
          <<: *only_release
          context: horizon
          project_id: 18

      - hokusai/deploy-production:
          <<: *only_release
          requires:
            - horizon/block

      - deploy-cloudflare-workers:
          <<: *only_release
          context: cloudflare
          requires:
            - hokusai/deploy-production

  canary:
    # Triggered by setting the canary_build pipeline parameter. Runs on any
    # branch (no branch filter) so feature branches can build a SHA-tagged
    # image without merging to main. Does NOT deploy — operator wires the
    # SHA into hokusai/<env>.yml in a separate canary YAML PR.
    when: << pipeline.parameters.canary_build >>
    jobs:
      - test
      - type-check
      - canary-image-push:
          context: hokusai
          requires:
            - test
            - type-check
